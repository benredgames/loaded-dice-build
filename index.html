<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>LoadedDice</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;
      font-family: Arial, Helvetica, sans-serif;
    }

    #unity-container {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: #111;
    }

    #unity-canvas {
      width: 100%;
      height: 100%;
      display: block;
      background: #231F20;
    }

    #loading-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at center, rgba(255,255,255,0.06), rgba(0,0,0,0.92));
      z-index: 20;
    }

    #loading-box {
      width: min(420px, 80vw);
      text-align: center;
      color: white;
    }

    #loading-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 18px;
    }

    #loading-subtitle {
      font-size: 14px;
      opacity: 0.8;
      margin-bottom: 16px;
    }

    #progress-bar-bg {
      width: 100%;
      height: 14px;
      background: rgba(255,255,255,0.14);
      border-radius: 999px;
      overflow: hidden;
    }

    #progress-bar-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #6aa6ff, #9f7aea);
      border-radius: 999px;
      transition: width 0.2s ease;
    }

    #progress-text {
      margin-top: 12px;
      font-size: 14px;
      opacity: 0.9;
    }

    #top-right-ui {
      position: absolute;
      top: 14px;
      right: 14px;
      z-index: 15;
      display: flex;
      gap: 10px;
    }

    .unity-button {
      appearance: none;
      border: 0;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      color: white;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(8px);
    }

    .unity-button:hover {
      background: rgba(255, 255, 255, 0.16);
    }

    #warning-banner {
      position: absolute;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      z-index: 25;
      max-width: min(680px, calc(100vw - 32px));
      padding: 12px 14px;
      border-radius: 12px;
      background: rgba(180, 40, 40, 0.92);
      color: white;
      font-size: 14px;
      line-height: 1.4;
      display: none;
    }

    @media (max-width: 768px) {
      #loading-title {
        font-size: 22px;
      }

      .unity-button {
        padding: 10px 12px;
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div id="unity-container">
    <canvas id="unity-canvas" tabindex="-1"></canvas>

    <div id="top-right-ui">
      <button id="fullscreen-button" class="unity-button" type="button">Fullscreen</button>
    </div>

    <div id="loading-overlay">
      <div id="loading-box">
        <div id="loading-title">LoadedDice</div>
        <div id="loading-subtitle">Loading…</div>
        <div id="progress-bar-bg">
          <div id="progress-bar-fill"></div>
        </div>
        <div id="progress-text">0%</div>
      </div>
    </div>

    <div id="warning-banner"></div>
  </div>

  <script>
    var canvas = document.querySelector("#unity-canvas");
    var loadingOverlay = document.querySelector("#loading-overlay");
    var progressBarFill = document.querySelector("#progress-bar-fill");
    var progressText = document.querySelector("#progress-text");
    var fullscreenButton = document.querySelector("#fullscreen-button");
    var warningBanner = document.querySelector("#warning-banner");

    function showBanner(message, type) {
      warningBanner.textContent = message;
      warningBanner.style.display = "block";
      warningBanner.style.background = type === "error"
        ? "rgba(180, 40, 40, 0.95)"
        : "rgba(180, 120, 20, 0.95)";
    }

    var buildUrl = "Build";
    var loaderUrl = buildUrl + "/loaded-dice-build.loader.js";

    var config = {
      dataUrl: buildUrl + "/loaded-dice-build.data",
      frameworkUrl: buildUrl + "/loaded-dice-build.framework.js",
      codeUrl: buildUrl + "/loaded-dice-build.wasm",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "DefaultCompany",
      productName: "LoadedDice",
      productVersion: "0.1.0",
      showBanner: showBanner
    };

    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
      var meta = document.createElement("meta");
      meta.name = "viewport";
      meta.content = "width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes";
      document.getElementsByTagName("head")[0].appendChild(meta);
    }

    var script = document.createElement("script");
    script.src = loaderUrl;
    script.onload = function() {
      createUnityInstance(canvas, config, function(progress) {
        var percent = Math.round(progress * 100);
        progressBarFill.style.width = percent + "%";
        progressText.textContent = percent + "%";
      }).then(function(unityInstance) {
        loadingOverlay.style.display = "none";
        fullscreenButton.onclick = function() {
          unityInstance.SetFullscreen(1);
        };
      }).catch(function(message) {
        showBanner(message, "error");
      });
    };
    document.body.appendChild(script);
  </script>
</body>
</html>
